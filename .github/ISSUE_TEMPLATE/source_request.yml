name: Source request
description: Suggest a new source to be added to sources.json
title: "[Source Request]: "
labels:
  - source-request
body:
  - type: input
    id: name
    attributes:
      label: Source name
      placeholder: Example News
    validations:
      required: true

  - type: input
    id: feed_url
    attributes:
      label: Feed URL
      description: Direct RSS/Atom URL
      placeholder: https://example.com/rss
    validations:
      required: true

  - type: input
    id: site_url
    attributes:
      label: Website URL
      placeholder: https://example.com
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language (ISO 639-1)
      placeholder: en
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country (ISO 3166-1 alpha-2)
      placeholder: US
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Category
      placeholder: general
    validations:
      required: true

  - type: input
    id: genre
    attributes:
      label: Genre
      placeholder: general
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      placeholder: One-line description of the source
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I confirmed the feed URL is public and accessible
          required: true
        - label: I checked this source is not already in sources.json
          required: true
